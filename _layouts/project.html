---
layout: default
---
<article class="project">
  <p class="back"><a href="{{ '/' | relative_url }}">← all projects</a></p>
  <h1>{{ page.title }}</h1>
  {% if page.summary %}<p class="lede">{{ page.summary }}</p>{% endif %}
  <p class="meta">
    {% if page.repo %}<a href="{{ page.repo }}">Code&nbsp;↗</a>{% endif %}
    {% if page.date %}<span> · {{ page.date | date: "%B %Y" }}</span>{% endif %}
  </p>
  {{ content }}
</article>
